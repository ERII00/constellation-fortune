<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>星座运势</title>
  <style>
    /* 全局样式变量：统一管理颜色、圆角、阴影等 */
    :root{
      --bg-a:#f5efe6;
      --bg-b:#e7e0d6;
      --bg-c:#f2eadb;
      --ink:#2a2a2a;
      --muted:#686868;
      --primary:#3b5b8a;
      --card:#ffffffee;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:16px;
    }
    /* 基础样式重置 */
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font:16px/1.6 "PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;}
    body{
      color:var(--ink);
      background:linear-gradient(145deg,var(--bg-a),var(--bg-b) 45%,var(--bg-c));
      position:relative;overflow-x:hidden;
    }
    /* 页面背景装饰 */
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;
      background:radial-gradient(200px 200px at 20% 30%, #ffffff20 0 30%, #0000 31%),
                  radial-gradient(300px 260px at 80% 70%, #ffffff18 0 30%, #0000 31%);
      mix-blend-mode:soft-light;
    }
    /* 主容器：居中+自适应宽度 */
    .wrap{
      max-width:980px;margin:0 auto;padding:28px 18px 72px;
      display:grid;gap:18px;
    }
    /* 头部区域：卡片样式+弹性布局 */
    header{
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
      padding:14px 18px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
      backdrop-filter:saturate(1.2) blur(6px);
    }
    /* 品牌logo+标题 */
    .brand{display:flex;align-items:center;gap:12px;}
    .logo{
      width:44px;height:44px;border-radius:50%;
      background:conic-gradient(from 20deg at 50% 50%, #b3866a 0 18%, #d4b79f 18% 36%, #a4b1c8 36% 54%, #8aa5b9 54% 72%, #c0a4a1 72% 90%, #b3866a 90% 100%);
      box-shadow:inset 0 0 0 2px #ffffff, 0 4px 14px rgba(0,0,0,.15);
    }
    h1{font-size:20px;font-weight:700;letter-spacing:.02em;}
    /* 筛选控件区域 */
    .settings{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .control{display:grid;gap:6px;min-width:140px;}
    label{font-size:12px;color:var(--muted);}
    /* 输入控件样式 */
    select,input,button{
      appearance:none;font:inherit;color:inherit;
      padding:10px 12px;border-radius:12px;border:1px solid #e6e1da;background:#fff;
      outline:none;transition:.2s border-color,.2s box-shadow;
    }
    select:focus,input:focus{border-color:var(--primary);box-shadow:0 0 0 6px rgba(59,91,138,.35);}
    /* 主按钮样式 */
    button.primary{
      background:linear-gradient(180deg,#3e5f95,#2e4b79);
      color:#fff;border:none;padding:12px 16px;font-weight:600;
    }
    button.primary:disabled{opacity:.6;cursor:not-allowed;}
    /* 加载状态 */
    .status{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px;}
    .dot{
      width:8px;height:8px;border-radius:50%;background:var(--muted);
      visibility:hidden;animation:pulse 1.2s ease infinite;
    }
    @keyframes pulse{0%{transform:scale(.9);opacity:.7}50%{transform:scale(1);opacity:1}100%{transform:scale(.9);opacity:.7}}
    /* 运势卡片布局 */
    .cards{display:grid;gap:16px;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));}
    .card{
      background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:16px;min-height:140px;display:grid;gap:8px;
    }
    .card h3{font-size:15px;color:var(--primary);margin:0;}
    .text{white-space:pre-wrap;word-wrap:break-word;text-align:left;align-self:start;justify-self:start;}
  </style>
</head>
<body>
  <div class="wrap">
    <!-- 头部：品牌+筛选控件 -->
    <header>
      <div class="brand">
        <div class="logo"></div>
        <h1>简约油画风 · 星座运势</h1>
      </div>
      <div class="settings">
        <div class="control">
          <label for="zodiac">星座</label>
          <select id="zodiac">
            <option>白羊座</option><option>金牛座</option><option>双子座</option><option>巨蟹座</option>
            <option>狮子座</option><option>处女座</option><option>天秤座</option><option>天蝎座</option>
            <option>射手座</option><option>摩羯座</option><option>水瓶座</option><option>双鱼座</option>
          </select>
        </div>
        <div class="control">
          <label for="date">日期</label>
          <input id="date" type="date">
        </div>
        <div class="control">
          <label>&nbsp;</label>
          <button id="gen" class="primary">生成运势</button>
        </div>
      </div>
    </header>

    <!-- 主体：状态+运势卡片 -->
    <div class="status" id="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">准备就绪</span>
    </div>
    <section class="cards">
      <article class="card">
        <h3>星象解读</h3>
        <div class="text" id="s-interpret"></div>
      </article>
      <article class="card">
        <h3>事业</h3>
        <div class="text" id="s-career"></div>
      </article>
      <article class="card">
        <h3>财运</h3>
        <div class="text" id="s-wealth"></div>
      </article>
      <article class="card">
        <h3>幸运色</h3>
        <div class="text" id="s-color"></div>
      </article>
    </section>
  </div>

  <script>
    // ====================== 1. 元素获取 ======================
    // 星座选择器
    const zodiacEl = document.getElementById("zodiac");
    // 日期选择器
    const dateEl = document.getElementById("date");
    // 生成按钮
    const genBtn = document.getElementById("gen");
    // 状态文本/加载圆点
    const statusText = document.getElementById("statusText");
    const dotEl = document.getElementById("dot");
    // 运势展示区域
    const interpretEl = document.getElementById("s-interpret");
    const careerEl = document.getElementById("s-career");
    const wealthEl = document.getElementById("s-wealth");
    const colorEl = document.getElementById("s-color");

    // ====================== 2. 配置项（核心参数） ======================
    // Coze 工作流API地址
    const API_URL = "https://api.coze.cn/v1/workflow/run";
    // 工作流ID（从Coze地址栏获取）
    const WORKFLOW_ID = "7611915188170375209";
    // PAT令牌（Coze API授权）
    const PAT = "pat_oh6RAY535iHobvm6odwlhrZtI1Nuv7YZahWLUAYNxNREXD8ThBXaOJNfY5AVERbk";

    // ====================== 3. 工具函数 ======================
    /**
     * 获取今日日期（格式：YYYY-MM-DD）
     * @returns {string} 今日日期字符串
     */
    function getTodayDate() {
      const now = new Date();
      return now.toISOString().split('T')[0]; // 简洁获取YYYY-MM-DD格式
    }

    /**
     * 清空所有运势展示区域
     */
    function clearResult() {
      interpretEl.textContent = "";
      careerEl.textContent = "";
      wealthEl.textContent = "";
      colorEl.textContent = "";
    }

    /**
     * 设置加载状态
     * @param {boolean} isBusy - 是否加载中
     */
    function setLoading(isBusy) {
      genBtn.disabled = isBusy;
      dotEl.style.visibility = isBusy ? "visible" : "hidden";
      statusText.textContent = isBusy ? "正在生成运势…" : "准备就绪";
    }

    function parseFortuneText(text) {
      const result = { interpretation: "", career: "", wealth: "", color: "" };
      if (!text || typeof text !== "string") return result;

      // 尝试直接匹配“标题：内容”块，直到下一个标题或结尾
      const names = {
        interpretation: ["星象解读","星象解析","整体运势"],
        career: ["事业","事业运势"],
        wealth: ["财运","财富运势","财运运势"],
        color: ["幸运色","幸运颜色"]
      };
      const flat = Object.values(names).flat();
      const titlePattern = flat.map(s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|");
      const blockRe = new RegExp(
        "(?:^|\\n)\\s*(?:#{1,6}\\s*)?(?:\\d+\\.|[①②③④一二三四][\\.、])?\\s*"
        + "(" + titlePattern + ")\\s*[:：]?\\s*([\\s\\S]*?)(?=(?:\\n\\s*(?:#{1,6}\\s*)?(?:\\d+\\.|[①②③④一二三四][\\.、])?\\s*(?:" + titlePattern + ")\\s*[:：]?)|$)",
        "g"
      );
      let m;
      while ((m = blockRe.exec(text)) !== null) {
        const title = m[1];
        const value = (m[2] || "").trim();
        if (!value) continue;
        if (names.interpretation.includes(title)) result.interpretation = value;
        else if (names.career.includes(title)) result.career = value;
        else if (names.wealth.includes(title)) result.wealth = value;
        else if (names.color.includes(title)) result.color = value;
      }

      // 兜底：若仍未匹配到任何板块，把全文放在“星象解读”
      if (!result.interpretation && !result.career && !result.wealth && !result.color) {
        result.interpretation = text.trim();
      }
      if (result.career) {
        result.career = result.career.replace(/^(?:事业|事业运势|运势)\s*[:：]\s*/,"");
      }
      if (result.wealth) {
        result.wealth = result.wealth.replace(/^(?:财运|财富运势|财运运势|运势)\s*[:：]\s*/,"");
      }
      return result;
    }

    /**
     * 更新页面运势展示
     * @param {string} text - Coze返回的原始运势文本
     */
    function updateFortuneView(text) {
      const fortune = parseFortuneText(text);
      interpretEl.textContent = fortune.interpretation;
      careerEl.textContent = fortune.career;
      wealthEl.textContent = fortune.wealth;
      colorEl.textContent = fortune.color;
    }

    // ====================== 4. 核心API调用 ======================
    /**
     * 调用Coze工作流API获取运势
     * @param {string} zodiac - 星座
     * @param {string} date - 日期
     * @returns {Promise<string>} 运势文本
     */
    async function fetchFortune(zodiac, date) {
      // 校验配置项是否完整
      if (!PAT || !WORKFLOW_ID || !API_URL) {
        throw new Error("Coze配置不完整，请检查PAT/工作流ID");
      }

      // 构建请求体
      const requestBody = {
        workflow_id: WORKFLOW_ID,
        parameters: {
          user_constellation: zodiac, // 传递给工作流的星座参数
          user_date: date             // 传递给工作流的日期参数
        }
      };

      // 发送POST请求
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${PAT}`, // API授权头
          "Content-Type": "application/json" // 请求体格式
        },
        body: JSON.stringify(requestBody)
      });

      // 处理HTTP错误
      if (!response.ok) {
        const errMsg = await response.text().catch(() => response.statusText);
        throw new Error(`API调用失败 [${response.status}]：${errMsg}`);
      }

      // 解析响应数据
      const responseData = await response.json();

      // 兼容多种返回结构：data 可能是字符串或对象；也可能把字段挂在更深层
      let innerData = {};
      if (typeof responseData.data === "string") {
        try { innerData = JSON.parse(responseData.data); } catch { innerData = {}; }
      } else if (typeof responseData.data === "object" && responseData.data) {
        innerData = responseData.data;
      } else {
        innerData = responseData;
      }

      // 优先直接拿 fortune_result；否则在对象中递归查找该键
      function deepPickFortune(obj) {
        if (!obj || typeof obj !== "object") return "";
        if (typeof obj.fortune_result === "string" && obj.fortune_result.trim()) return obj.fortune_result;
        for (const k of Object.keys(obj)) {
          const v = obj[k];
          if (k === "fortune_result" && typeof v === "string" && v.trim()) return v;
          if (v && typeof v === "object") {
            const sub = deepPickFortune(v);
            if (sub) return sub;
          }
        }
        return "";
      }
      let fortuneText = "";
      if (typeof innerData.fortune_result === "string") {
        fortuneText = innerData.fortune_result;
      } else {
        fortuneText = deepPickFortune(innerData);
      }
      if (!fortuneText) {
        // 若 fortune_result 不是字符串而是对象（已结构化），尝试组装
        if (innerData.fortune_result && typeof innerData.fortune_result === "object") {
          const f = innerData.fortune_result;
          fortuneText = [
            f.interpretation ? `星象解读：${f.interpretation}` : "",
            f.career ? `事业：${f.career}` : "",
            f.wealth ? `财运：${f.wealth}` : "",
            f.color ? `幸运色：${f.color}` : ""
          ].filter(Boolean).join("\n");
        }
      }
      if (!fortuneText) {
        throw new Error("未获取到运势数据，返回结构：" + JSON.stringify(responseData));
      }
      return fortuneText;
    }

    // ====================== 5. 事件绑定/初始化 ======================
    /**
     * 生成运势主逻辑
     */
    async function generateFortune() {
      // 1. 前置处理：清空结果+设置加载状态
      clearResult();
      setLoading(true);

      // 2. 获取用户选择的星座/日期
      const selectedZodiac = zodiacEl.value.trim();
      const selectedDate = dateEl.value || getTodayDate();

      try {
        // 3. 调用API获取运势
        const fortuneText = await fetchFortune(selectedZodiac, selectedDate);
        
        // 4. 解析并展示运势
        updateFortuneView(fortuneText);
        
        // 5. 更新状态
        statusText.textContent = "生成完成";
      } catch (error) {
        // 6. 错误处理：显示错误信息+打印日志
        statusText.textContent = "生成失败";
        interpretEl.textContent = `错误：${error.message}`;
        console.error("生成运势失败：", error);
      } finally {
        // 7. 最终：关闭加载状态（无论成功/失败）
        setLoading(false);
      }
    }

    // 初始化：设置默认日期为今日
    dateEl.value = getTodayDate();

    // 绑定按钮点击事件（阻止默认行为+调用生成逻辑）
    genBtn.addEventListener("click", (e) => {
      e.preventDefault(); // 防止表单默认提交
      generateFortune();
    });
  </script>
</body>
</html>
